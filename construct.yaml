schema_version: 3
name: "FAGAN"
slug: "fagan"
version: "0.2.0"
description: "FAGAN — strict adversarial code review for diffs and implementations. Named after Michael Fagan (IBM 1976, formal code inspection). Multimodel by default: 3-voice panel (Opus skeptic + GPT reviewer + Composer reviewer) from distinct base corpora, severity-cluster consensus, lone-critical-holds-gate. Single-GPT fast path via `--mode fast`. Composes with codex-rescue or any implementer."
short_description: "FAGAN · multimodel diff-scoped code review (Opus + GPT + Composer)"
author: "0xHoneyJar"
license: "MIT"
type: "skill-pack"
visibility: public

repository: https://github.com/0xHoneyJar/construct-fagan.git
aliases:
  legacy_slug: codex-review   # back-compat for installs that pinned the old slug

skills:
  - slug: reviewing-diffs
    path: skills/reviewing-diffs
  - slug: reviewing-files
    path: skills/reviewing-files

identity:
  persona: identity/persona.yaml
  expertise: identity/expertise.yaml

domain:
  - engineering
  - code-review
  - adversarial-review

expertise:
  - diff-scoped code review
  - structured-output review findings
  - multimodel panel orchestration (claude + codex + cursor)
  - severity-cluster consensus + lone-critical-holds-gate
  - convergence loop discipline

compose_with:
  - codex-rescue
  - artisan
  - flatline

events:
  emits:
    - codex-review.finding.created
    - codex-review.verdict.changed
    - codex-review.iteration.completed
  consumes:
    - implement.diff.created

golden_path:
  commands:
    - name: review-diff
      description: "Adversarial review of a unified diff"
      truename_map:
        diff_ready: /reviewing-diffs
    - name: review-files
      description: "Adversarial review of specific files (no diff context)"
      truename_map:
        files_specified: /reviewing-files

requirements:
  tools:
    - claude           # claude CLI — opus-skeptic voice (multimodel default)
    - codex            # codex CLI — gpt-reviewer voice (default; also fast-mode backend)
    - cursor-agent     # cursor-agent — composer-reviewer voice (Pro subscription required; drops on free tier)
    - jq
    - bash >= 4
  env:
    - OPENAI_API_KEY   # codex auth (or ~/.codex/auth.json from ChatGPT subscription)
